services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: manwei-sqlserver
    restart: always
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=${SA_PASSWORD}
      - MSSQL_PID=Express
    volumes:
      - manwei_db_data:/var/opt/mssql
    ports:
      - "127.0.0.1:1433:1433"
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$$SA_PASSWORD" -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: deploy/Dockerfile.api
    container_name: manwei-api
    restart: always
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=ManWeiDB;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True
      - Jwt__Key=${JWT__KEY}
      - Jwt__Issuer=ManWei.Api
      - Jwt__Audience=ManWei.Client
      - BangumiApi__AccessToken=${BangumiApi__AccessToken}
      - WxMiniApp__AppSecret=${WxMiniApp__AppSecret}
      - DeepSeek__ApiKey=${DeepSeek__ApiKey}
    volumes:
      - manwei_uploads:/app/wwwroot/uploads

  nginx:
    image: nginx:alpine
    container_name: manwei-nginx
    restart: always
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/certs:/etc/nginx/certs:ro
      - /app/projects/pc-admin-dist:/usr/share/nginx/admin:ro
      - /app/projects/pc-client-dist:/usr/share/nginx/client:ro

volumes:
  manwei_db_data:
  manwei_uploads: